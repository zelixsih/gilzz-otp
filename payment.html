<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pembayaran - Gilzzotp</title>
    <link rel="icon" type="image/jpeg" href="images/Riki.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            background: var(--bg-body);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .payment-container {
            width: 100%;
            background: var(--bg-card);
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-shadow: none;
        }

        .pay-header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-card);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        
        .pay-header h3 { 
            margin: 0; 
            font-size: 18px; 
            color: var(--text-main); 
        }
        
        .btn-close { 
            font-size: 20px; 
            color: var(--text-sub); 
            cursor: pointer; 
        }

        .pay-content-wrapper {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-qr {
            text-align: center;
            width: 100%;
        }

        .section-detail {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .timer-box {
            background: #fff3e0; 
            color: #e67e22;
            padding: 12px; 
            border-radius: 12px;
            text-align: center; 
            font-size: 14px; 
            font-weight: bold;
            border: 1px solid #ffe0b2;
            margin-bottom: 20px;
            display: inline-flex; 
            align-items: center; 
            gap: 8px;
        }

        .qr-box {
            background: white;
            padding: 20px;
            border-radius: 20px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            cursor: zoom-in;
            min-width: 200px;
            min-height: 200px;
        }
        
        .qr-box img, .qr-box canvas {
            display: block;
            max-width: 100%;
        }

        .qr-actions {
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin-top: 15px;
        }
        
        .btn-mini { 
            background: var(--bg-body); 
            border: 1px solid var(--border-color); 
            padding: 8px 15px; 
            border-radius: 20px; 
            font-size: 12px; 
            color: var(--text-main); 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            transition: 0.2s;
        }
        
        .btn-mini:hover { 
            background: var(--border-color); 
        }

        .detail-card {
            background: var(--bg-body);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .row-info { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 12px; 
            font-size: 14px; 
        }
        
        .lbl { 
            color: var(--text-sub); 
        }
        
        .val { 
            font-weight: bold; 
            color: var(--text-main); 
            text-align: right; 
            word-break: break-all; 
        }
        
        .val.price { 
            color: var(--primary-color); 
            font-size: 24px; 
            font-weight: 800; 
        }

        .pay-footer {
            padding: 20px;
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .btn-full { 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 14px; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        
        .btn-primary { 
            background: var(--primary-color); 
            color: white; 
        }
        
        .btn-primary:hover { 
            opacity: 0.9; 
        }
        
        .btn-danger { 
            background: transparent; 
            color: #e74c3c; 
            border: 1px solid #e74c3c; 
        }
        
        .btn-success { 
            background: #2ecc71; 
            color: white; 
            display: none; 
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3); 
        }

        .stamp-overlay {
            position: absolute; 
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg) scale(0);
            border: 6px solid; 
            padding: 10px 25px; 
            font-size: 3rem; 
            font-weight: 900;
            text-transform: uppercase; 
            border-radius: 12px; 
            opacity: 0; 
            pointer-events: none;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 100;
        }
        
        .stamp-overlay.show { 
            transform: translate(-50%, -50%) rotate(-15deg) scale(1); 
            opacity: 0.8; 
        }
        
        .stamp-success { 
            color: #2ecc71; 
            border-color: #2ecc71; 
        }
        
        .stamp-failed { 
            color: #e74c3c; 
            border-color: #e74c3c; 
        }

        .zoom-overlay {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0,0,0,0.9); 
            z-index: 9999; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            flex-direction: column;
            padding: 20px;
        }
        
        .zoom-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
            text-align: center;
        }
        
        .hidden { 
            display: none !important; 
        }

        .status-badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
            text-align: center;
            display: inline-block;
        }
        
        .st-pending {
            background: #fff3e0;
            color: #e67e22;
        }
        
        .st-sukses {
            background: #e8f5e9;
            color: #2ecc71;
        }
        
        .st-gagal {
            background: #ffebee;
            color: #e74c3c;
        }

        .provider-icon {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            margin-right: 8px;
            vertical-align: middle;
        }

        .desktop-actions {
            display: none;
        }

        @media (min-width: 768px) {
            body {
                align-items: center;
                padding: 40px 20px;
            }

            .payment-container {
                max-width: 900px;
                min-height: auto;
                border-radius: 20px;
                box-shadow: 0 15px 40px rgba(0,0,0,0.1);
                overflow: hidden;
            }

            .pay-content-wrapper {
                flex-direction: row;
                align-items: flex-start;
                padding: 40px;
                gap: 50px;
            }

            .section-qr {
                flex: 1;
                border-right: 1px solid var(--border-color);
                padding-right: 40px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            .section-detail {
                flex: 1;
            }

            .pay-footer { 
                display: none; 
            }

            .desktop-actions {
                display: flex;
                flex-direction: column;
                gap: 10px;
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="payment-container">
        <div id="stamp" class="stamp-overlay">LUNAS</div>

        <div class="pay-header">
            <h3>Pembayaran</h3>
            <i class="fas fa-times btn-close" id="btnCloseHeader"></i>
        </div>

        <div class="pay-content-wrapper">
            
            <div class="section-qr">
                <div id="timerBar" class="timer-box">
                    <i class="fas fa-stopwatch"></i>
                    <span>Sisa Waktu <b id="timerDisplay">--:--</b></span>
                </div>

                <div id="qrArea">
                    <div class="qr-box" id="qrContainer">
                        <div id="qrcode"></div>
                    </div>
                    
                    <div class="qr-actions">
                        <button class="btn-mini" id="btnZoom">
                            <i class="fas fa-search-plus"></i> Zoom
                        </button>
                        <button class="btn-mini" id="btnDownload">
                            <i class="fas fa-download"></i> Simpan
                        </button>
                    </div>
                    
                    <p style="font-size:12px; color:#aaa; margin-top:15px; max-width: 250px; margin-left: auto; margin-right: auto;">
                        Scan QRIS ini menggunakan DANA, OVO, ShopeePay, GoPay, LinkAja, atau Mobile Banking.
                    </p>
                </div>
            </div>

            <div class="section-detail">
                <div class="detail-card">
                    <div class="row-info">
                        <span class="lbl">ID Order</span>
                        <span class="val" id="payID">...</span>
                    </div>
                    
                    <div class="row-info">
                        <span class="lbl">Tanggal</span>
                        <span class="val" id="payDate">...</span>
                    </div>
                    
                    <div class="row-info">
                        <span class="lbl">Akun</span>
                        <span class="val" id="payUser">...</span>
                    </div>

                    <div class="row-info" id="rowPanelUser" style="display:none; background:#f9f9f9; padding:5px 10px; border-radius:8px; margin-bottom:12px;">
                        <span class="lbl">Detail Produk</span>
                        <span class="val" id="valPanelUser" style="color:var(--primary-color);">...</span>
                    </div>

                    <div class="row-info">
                        <span class="lbl" id="lblNominal">Nominal Isi</span>
                        <span class="val" id="paySaldo">Rp 0</span>
                    </div>

                    <div class="row-info">
                        <span class="lbl">Biaya Admin</span>
                        <span class="val" id="payFee" style="color:#e67e22;">Rp 0</span>
                    </div>

                    <div class="row-info">
                        <span class="lbl">Status</span>
                        <span class="status-badge st-pending" id="payStatus">Menunggu</span>
                    </div>
                    
                    <div style="border-top:1px dashed var(--border-color); margin:15px 0;"></div>
                    
                    <div class="row-info" style="align-items: center;">
                        <span class="lbl">Total Bayar</span>
                        <span class="val price" id="payAmount">Rp 0</span>
                    </div>
                </div>

                <div class="desktop-actions">
                    <button id="btnSuccessDesk" class="btn-full btn-success" onclick="window.location.href='/'">
                        <i class="fas fa-wallet"></i> CEK SALDO SAYA
                    </button>
                    <button id="btnCheckDesk" class="btn-full btn-primary">
                        <i class="fas fa-sync-alt"></i> CEK STATUS PEMBAYARAN
                    </button>
                    <button id="btnCancelDesk" class="btn-full btn-danger">
                        BATALKAN PESANAN
                    </button>
                </div>
            </div>

        </div>

        <div class="pay-footer">
            <button id="btnCheck" class="btn-full btn-primary">
                <i class="fas fa-sync-alt"></i> CEK STATUS
            </button>
            <button id="btnCancel" class="btn-full btn-danger">
                BATALKAN PESANAN
            </button>
        </div>
    </div>
    
    <div id="zoomOverlay" class="zoom-overlay" onclick="toggleZoom(false)">
        <div class="zoom-card">
            <div id="qrcode-zoom"></div>
        </div>
        <p style="color:white; margin-top:20px; font-size:14px; text-shadow: 0 1px 3px rgba(0,0,0,0.8);">
            Tekan tahan gambar QR untuk menyimpan manual
        </p>
    </div>

<script>
    let countdown, checkInterval;
    
    document.addEventListener('DOMContentLoaded', () => {
        const data = JSON.parse(localStorage.getItem('pendingTrx'));
        if(!data) { 
            window.location.href = '/'; 
            return; 
        }

        document.getElementById('payID').innerText = data.order_id;
        
        const trxDate = new Date(data.expire_at - 5 * 60 * 1000);
        document.getElementById('payDate').innerText = trxDate.toLocaleString('id-ID', {
            day: 'numeric', month: 'short', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
        }).replace('.', ':');

        document.getElementById('payUser').innerText = data.username || 'Guest';

        const rowPanel = document.getElementById('rowPanelUser');
        
        if(data.trx_type !== 'deposit' && rowPanel) {
            rowPanel.style.display = 'flex';
            rowPanel.style.justifyContent = 'space-between';
        }

        // Handle different transaction types for display
        if (data.trx_type === 'buy_panel') {
            document.querySelector('#rowPanelUser .lbl').innerText = "Username Panel";
            document.getElementById('lblNominal').innerText = 'Harga Paket';
            if (data.username_panel) document.getElementById('valPanelUser').innerText = data.username_panel;
        }
        else if (data.trx_type === 'buy_murid') {
            document.querySelector('#rowPanelUser .lbl').innerText = "Paket Kelas";
            document.getElementById('valPanelUser').innerText = data.product_name || 'Murid';
            document.getElementById('lblNominal').innerText = 'Biaya Join';
        }
        else if (data.trx_type === 'buy_script') {
            document.querySelector('#rowPanelUser .lbl').innerText = "Nama Script";
            document.getElementById('valPanelUser').innerText = data.product_name || 'Script';
            document.getElementById('lblNominal').innerText = 'Harga Script';
        }
        else if (data.trx_type === 'buy_vps') {
            document.querySelector('#rowPanelUser .lbl').innerText = "Paket VPS";
            document.getElementById('valPanelUser').innerText = data.product_name || 'VPS Server';
            document.getElementById('lblNominal').innerText = 'Harga Layanan';
        }
        else if (data.trx_type === 'buy_app') {
            document.querySelector('#rowPanelUser .lbl').innerText = "Produk";
            document.getElementById('valPanelUser').innerText = data.product_name || 'App Premium';
            document.getElementById('lblNominal').innerText = 'Harga';
        }
        else if (data.trx_type === 'buy_subdomain') { 
            document.querySelector('#rowPanelUser .lbl').innerText = "Subdomain";
            let fullDomain = 'Subdomain Premium';
            if(data.product_data && data.product_data.subdomain && data.product_data.zone_name) {
                fullDomain = `${data.product_data.subdomain}.${data.product_data.zone_name}`;
            }
            document.getElementById('valPanelUser').innerText = fullDomain;
            document.getElementById('lblNominal').innerText = 'Harga';
        }
        else if (data.trx_type === 'buy_sosmed') {
            document.querySelector('#rowPanelUser .lbl').innerText = "Layanan";
            document.getElementById('valPanelUser').innerText = data.product_name || 'Layanan SMM';
            document.getElementById('lblNominal').innerText = 'Target';
            document.getElementById('paySaldo').innerText = data.target || '-'; 
        }
        else if (data.trx_type === 'buy_nokos') { 
            document.querySelector('#rowPanelUser .lbl').innerText = "Layanan";
            document.getElementById('valPanelUser').innerText = data.product_name || 'Nokos OTP';
            document.getElementById('lblNominal').innerText = 'Harga';
        }
        else if (data.trx_type === 'buy_game') { 
            document.querySelector('#rowPanelUser .lbl').innerText = "Game";
            let desc = data.product_name || 'Game Topup';
            if (data.target) desc += ` (ID: ${data.target})`;
            document.getElementById('valPanelUser').innerText = desc;
            document.getElementById('lblNominal').innerText = 'Harga';
        }
        else if (data.trx_type === 'buy_ewallet') { 
    document.querySelector('#rowPanelUser .lbl').innerText = "E-Wallet";
    
    let provider = 'DANA';
    let providerIcon = '';
    
    if(data.product_data) {
        if(data.product_data.provider === 'gopay-driver' || data.product_data.provider === 'gopay_driver') {
            provider = 'GoPay Driver';
            providerIcon = '<img src="https://api.deline.web.id/seNZ6Uj3C2.png" class="provider-icon"> ';
        } else if(data.product_data.provider === 'gopay' || data.product_data.provider === 'gopay-customer') {
            provider = 'GoPay Customer';
            providerIcon = '<img src="https://api.deline.web.id/2nnwaEpb4o.jpeg" class="provider-icon"> ';
        } else if(data.product_data.provider === 'ovo') {
            provider = 'OVO';
            providerIcon = '<img src="https://img.icons8.com/color/96/ovo.png" class="provider-icon"> ';
        } 
        // TAMBAHKAN INI UNTUK SHOPEEPAY
        else if(data.product_data.provider === 'shopeepay') {
            provider = 'ShopeePay';
            providerIcon = '<img src="https://img.icons8.com/color/96/shopee.png" class="provider-icon"> ';
        }
        // TAMBAHKAN INI UNTUK LINKAJA (LETAKKAN DI SINI)
        else if(data.product_data && data.product_data.provider === 'linkaja') {
            provider = 'LinkAja';
            providerIcon = '<img src="https://api.deline.web.id/wCXLHdBsPw.png" class="provider-icon"> ';
        }
        else if(data.product_data && data.product_data.provider === 'isaku') {
    provider = 'iSaku';
    providerIcon = '<img src="https://api.deline.web.id/wlBGiEQtuX.png" class="provider-icon"> ';
}
        else if(data.product_data && data.product_data.provider === 'astrapay') {
    provider = 'Astrapay';
    providerIcon = '<img src="https://api.deline.web.id/R87kIeNath.jpeg" class="provider-icon"> ';
}
else if(data.product_data && data.product_data.provider === 'kaspro') {
    provider = 'Kaspro';
    providerIcon = '<img src="https://api.deline.web.id/il3T6M0giR.png" class="provider-icon"> ';
}
        else {
            providerIcon = '<img src="https://api.deline.web.id/RzSYWF9Wxz.jpeg" class="provider-icon"> ';
        }
    }
    
    let desc = `${provider} - ${data.product_name || 'Topup Saldo'}`;
    if (data.target) desc += `<br><small>No: ${data.target}</small>`;
    
    document.getElementById('valPanelUser').innerHTML = providerIcon + desc;
    document.getElementById('lblNominal').innerText = 'Harga';
}
        else if (data.trx_type === 'transfer_personal') {
            document.querySelector('#rowPanelUser .lbl').innerText = "Penerima";
            const match = data.order_id.match(/^TRF-([^-]+)-/);
            if(match) {
                document.getElementById('valPanelUser').innerText = match[1];
            } else {
                document.getElementById('valPanelUser').innerText = '-';
            }
            document.getElementById('lblNominal').innerText = 'Nominal Transfer';
        }
        else if (data.trx_type === 'transfer_qris') {
            document.querySelector('#rowPanelUser .lbl').innerText = "Penerima";
            let recipient = data.product_data?.recipient || '-';
            if(recipient === '-' && data.order_id) {
                const match = data.order_id.match(/^TRFQ-([^-]+)-([^-]+)-/);
                if(match && match[2]) recipient = match[2];
            }
            document.getElementById('valPanelUser').innerText = recipient;
            document.getElementById('lblNominal').innerText = 'Nominal Transfer';
        }

        const depositAmount = parseInt(data.deposit_amount);
        const totalPay = parseInt(data.pay_amount);
        const adminFee = totalPay - depositAmount;

        document.getElementById('paySaldo').innerText = 'Rp ' + depositAmount.toLocaleString('id-ID');
        document.getElementById('payFee').innerText = 'Rp ' + adminFee.toLocaleString('id-ID');
        document.getElementById('payAmount').innerText = 'Rp ' + totalPay.toLocaleString('id-ID');

        const qrOpts = { 
            text: data.qr_string, 
            width: 200, 
            height: 200, 
            colorDark:"#000000", 
            colorLight:"#ffffff", 
            correctLevel: QRCode.CorrectLevel.L 
        };
        
        const qrContainer = document.getElementById("qrcode"); 
        qrContainer.innerHTML = "";
        new QRCode(qrContainer, qrOpts);

        const qrContainerZoom = document.getElementById("qrcode-zoom"); 
        qrContainerZoom.innerHTML = "";
        new QRCode(qrContainerZoom, {...qrOpts, width: 280, height: 280});

        setupButtons(data.order_id);
        setupZoom();
        startTimer(data.expire_at);
        startAutoCheck(data.order_id);
    });

    async function checkTransferPayment(orderId) {
        try {
            const res = await fetch('/api/check-transfer-payment', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({order_id: orderId})
            });
            return await res.json();
        } catch(e) {
            return { success: false };
        }
    }

    async function handleTransferCheck(orderId) {
        const btns = document.querySelectorAll('#btnCheck, #btnCheckDesk');
        btns.forEach(b => { 
            b.innerHTML='<i class="fas fa-spinner fa-spin"></i> ...'; 
            b.disabled=true; 
        });
        
        const result = await checkTransferPayment(orderId);
        
        if(result.success && result.status === 'success') {
            uiSuccess(result);
        } else {
            Swal.fire('Info', 'Transfer masih dalam proses atau belum diterima', 'info');
        }
        
        btns.forEach(b => { 
            b.innerHTML='<i class="fas fa-sync-alt"></i> CEK STATUS'; 
            b.disabled=false; 
        });
    }

    window.manualCheck = async function(orderId) {
        const data = JSON.parse(localStorage.getItem('pendingTrx'));
        if(data && (data.trx_type === 'transfer_qris' || data.trx_type === 'transfer_personal')) {
            await handleTransferCheck(orderId);
        } else {
            await checkStatus(orderId, false);
        }
    };

    window.startAutoCheck = function(orderId) {
        const data = JSON.parse(localStorage.getItem('pendingTrx'));
        if(data && (data.trx_type === 'transfer_qris' || data.trx_type === 'transfer_personal')) {
            checkInterval = setInterval(async () => {
                const result = await checkTransferPayment(orderId);
                if(result.success && result.status === 'success') {
                    uiSuccess(result);
                }
            }, 5000);
        } else {
            checkInterval = setInterval(() => checkStatus(orderId, true), 5000);
        }
    };

    function setupButtons(orderId) {
        const btnCheck = document.getElementById('btnCheck');
        const btnCheckDesk = document.getElementById('btnCheckDesk');
        const btnCancel = document.getElementById('btnCancel');
        const btnCancelDesk = document.getElementById('btnCancelDesk');
        
        if(btnCheck) {
            btnCheck.onclick = () => {
                const data = JSON.parse(localStorage.getItem('pendingTrx'));
                if(data && (data.trx_type === 'transfer_qris' || data.trx_type === 'transfer_personal')) {
                    handleTransferCheck(orderId);
                } else {
                    manualCheck(orderId);
                }
            };
        }

        if(btnCheckDesk) {
            btnCheckDesk.onclick = () => {
                const data = JSON.parse(localStorage.getItem('pendingTrx'));
                if(data && (data.trx_type === 'transfer_qris' || data.trx_type === 'transfer_personal')) {
                    handleTransferCheck(orderId);
                } else {
                    manualCheck(orderId);
                }
            };
        }

        if(btnCancel) {
            btnCancel.onclick = () => {
                Swal.fire({
                    title:'Batalkan?', 
                    text:"Transaksi akan dihapus.", 
                    icon:'warning', 
                    showCancelButton:true, 
                    confirmButtonColor:'#e74c3c', 
                    cancelButtonColor:'#7f8c8d', 
                    confirmButtonText:'Ya, Batalkan'
                }).then((r)=>{
                    if(r.isConfirmed) cancelOrder(orderId)
                });
            };
        }

        if(btnCancelDesk) {
            btnCancelDesk.onclick = () => {
                Swal.fire({
                    title:'Batalkan?', 
                    text:"Transaksi akan dihapus.", 
                    icon:'warning', 
                    showCancelButton:true, 
                    confirmButtonColor:'#e74c3c', 
                    cancelButtonColor:'#7f8c8d', 
                    confirmButtonText:'Ya, Batalkan'
                }).then((r)=>{
                    if(r.isConfirmed) cancelOrder(orderId)
                });
            };
        }

        document.getElementById('btnDownload').onclick = () => {
            const qrCanvas = document.querySelector('#qrcode canvas');
            const qrImg = document.querySelector('#qrcode img');
            let imageSrc = null;
            
            if (qrCanvas) imageSrc = qrCanvas.toDataURL("image/png");
            else if (qrImg) imageSrc = qrImg.src;

            if (imageSrc) {
                const link = document.createElement('a');
                link.href = imageSrc;
                link.download = `QRIS-${orderId}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                Swal.fire({icon: 'success', title: 'Disimpan', text: 'Jika gagal, tekan tahan gambar QR lalu pilih Simpan.', timer: 3000});
            } else {
                Swal.fire('Gagal', 'QR Code belum siap.', 'error');
            }
        };

        document.getElementById('btnCloseHeader').onclick = () => window.location.href = '/';
    }

    function uiFailed(isCancelled) {
        clearInterval(countdown); 
        clearInterval(checkInterval);
        localStorage.removeItem('pendingTrx');
        
        const stamp = document.getElementById('stamp'); 
        stamp.innerText = isCancelled ? "BATAL" : "EXPIRED"; 
        stamp.classList.add('show', 'stamp-failed');
        
        const badge = document.getElementById('payStatus'); 
        badge.className = 'status-badge st-gagal'; 
        badge.innerText = isCancelled ? 'DIBATALKAN' : 'KADALUARSA';
        
        document.getElementById('qrArea').style.opacity = '0.3';
        document.getElementById('timerBar').style.display = 'none';
        
        document.querySelectorAll('button').forEach(b => b.disabled = true);
        setTimeout(() => window.location.href = '/', 2500);
    }

    function startTimer(expireAt) {
        const display = document.getElementById('timerDisplay');
        countdown = setInterval(() => {
            const diff = expireAt - Date.now();
            if(diff <= 0) uiFailed(false);
            else { 
                const m = Math.floor((diff%3600000)/60000); 
                const s = Math.floor((diff%60000)/1000); 
                display.innerText = `${m}:${s<10?'0'+s:s}`; 
            }
        }, 1000);
    }

    async function checkStatus(orderId, silent) {
        try {
            const res = await fetch('/api/check-payment', {
                method:'POST', 
                headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify({order_id:orderId})
            });
            const r = await res.json();
            
            if(r.status === 'success') uiSuccess(r); 
            else if(r.status === 'canceled' || r.status === 'expired') uiFailed(r.status === 'canceled');
            else if(!silent) Swal.fire('Belum Lunas', 'Pembayaran belum terdeteksi sistem.', 'info');
        } catch(e){}
    }

    async function cancelOrder(orderId) {
        try { 
            await fetch('/api/cancel-transaction', {
                method:'POST', 
                headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify({order_id:orderId})
            }); 
            uiFailed(true); 
        } catch(e) { 
            window.location.href='/'; 
        }
    }
